<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Halqa — Phone</title>
<style>
  :root{--bezel:#101312;--edge:#2a2f2d;--glow:#1c6349}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(1200px 700px at 50% 20%,#17332c,#0b1512 70%);font-family:Georgia,serif;padding:24px}
  .stage{display:grid;gap:14px;justify-items:center}
  .phone{position:relative;width:390px;height:844px;background:var(--bezel);border-radius:54px;padding:14px;box-shadow:0 0 0 2px var(--edge),0 30px 80px #000c,0 0 120px #1c634922;}
  .phone::before{content:"";position:absolute;top:24px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#000;border-radius:20px;z-index:5}
  .screen{width:100%;height:100%;border:0;border-radius:40px;background:#fffdf8}
  .caption{color:#cfe3d9;font-size:13px;letter-spacing:.04em;opacity:.8;text-align:center}
  .caption b{color:#ffd9be}
  @media(max-height:940px){.phone{transform:scale(.88);transform-origin:top center}}
  @media(max-height:820px){.phone{transform:scale(.76)}}
</style>
</head>
<body>
  <div class="stage">
    <div class="phone"><iframe class="screen" src="/" title="Halqa mobile"></iframe></div>
    <div class="caption"><b>Halqa</b> · phone view (390×844) · the app inside is fully live — log in and use it normally</div>
  </div>
</body>
</html>
